services:
  - type: web
    name: foodaily-scraper
    runtime: python
    buildCommand: pip install -r server/requirements.txt
    startCommand: cd server && gunicorn app:app --workers 2 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: CACHE_TTL
        value: 1800
    plan: free
