<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foodaily 内容生产系统</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface2: #1a1a26;
  --border: #2a2a3a;
  --text: #e8e8ef;
  --text-muted: #8888a0;
  --accent: #ff6b35;
  --accent2: #ff8f5e;
  --new-badge: #00d68f;
  --new-glow: rgba(0, 214, 143, 0.15);
  --score-high: #00d68f;
  --score-mid: #ffaa00;
  --score-low: #ff4757;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Animated background */
.bg-grid {
  position: fixed;
  inset: 0;
  z-index: 0;
  background-image:
    radial-gradient(ellipse 80% 60% at 50% 0%, rgba(255,107,53,0.06), transparent),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(0,214,143,0.04), transparent);
}

.container {
  position: relative;
  z-index: 1;
  max-width: 1200px;
  margin: 0 auto;
  padding: 2rem 1.5rem;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 2.5rem;
  flex-wrap: wrap;
  gap: 1rem;
}
.logo-group {
  display: flex;
  align-items: center;
  gap: 1rem;
}
.logo-icon {
  width: 48px;
  height: 48px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  box-shadow: 0 4px 20px rgba(255,107,53,0.25);
}
.logo-text h1 {
  font-size: 1.5rem;
  font-weight: 800;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, #fff, #ccc);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.logo-text p {
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-top: 2px;
}

/* Refresh Button */
.refresh-btn {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.75rem 1.5rem;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  box-shadow: 0 4px 20px rgba(255,107,53,0.3);
  position: relative;
  overflow: hidden;
}
.refresh-btn:hover {
  transform: translateY(-2px) scale(1.03);
  box-shadow: 0 6px 30px rgba(255,107,53,0.4);
}
.refresh-btn:active {
  transform: translateY(0) scale(0.98);
}
.refresh-btn.spinning .refresh-icon {
  animation: spin 0.8s linear infinite;
}
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
.refresh-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
  opacity: 0;
  transition: opacity 0.3s;
}
.refresh-btn:hover::after { opacity: 1; }

/* Status bar */
.status-bar {
  display: flex;
  align-items: center;
  gap: 1.5rem;
  padding: 1rem 1.5rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
}
.status-item {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.85rem;
}
.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.status-dot.green { background: var(--score-high); box-shadow: 0 0 8px rgba(0,214,143,0.5); }
.status-dot.yellow { background: var(--score-mid); box-shadow: 0 0 8px rgba(255,170,0,0.5); }
.status-dot.red { background: var(--score-low); box-shadow: 0 0 8px rgba(255,71,87,0.5); }
.status-dot.gray { background: var(--text-muted); }
.status-label { color: var(--text-muted); }
.status-value { color: var(--text); font-weight: 600; }

/* Pipeline */
.pipeline {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-bottom: 2rem;
  overflow-x: auto;
  padding: 0.5rem 0;
}
.pipeline-step {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.5rem 1rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 0.82rem;
  white-space: nowrap;
  transition: all 0.3s;
}
.pipeline-step.active {
  border-color: var(--accent);
  background: rgba(255,107,53,0.08);
  color: var(--accent);
}
.pipeline-step.done {
  border-color: var(--score-high);
  background: rgba(0,214,143,0.06);
  color: var(--score-high);
}
.pipeline-arrow {
  color: var(--text-muted);
  font-size: 1rem;
  flex-shrink: 0;
}

/* Filter bar */
.filter-bar {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
}
.filter-chip {
  padding: 0.4rem 0.9rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 0.8rem;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--text-muted);
}
.filter-chip:hover, .filter-chip.active {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(255,107,53,0.08);
}

/* Topic Card */
.topic-list {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}
.topic-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.25rem 1.5rem;
  transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  position: relative;
  overflow: hidden;
}
.topic-card:hover {
  border-color: rgba(255,107,53,0.3);
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.topic-card.is-new {
  border-color: rgba(0,214,143,0.3);
  background: linear-gradient(135deg, var(--surface), var(--new-glow));
}
.topic-card.is-new::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--new-badge), transparent);
}

/* New badge */
.new-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  padding: 0.2rem 0.6rem;
  background: rgba(0,214,143,0.12);
  border: 1px solid rgba(0,214,143,0.25);
  border-radius: 6px;
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--new-badge);
  animation: newPulse 2s ease-in-out infinite;
}
@keyframes newPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}

/* Score */
.score-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  padding: 0.2rem 0.55rem;
  border-radius: 6px;
  font-size: 0.75rem;
  font-weight: 700;
}
.score-high { background: rgba(0,214,143,0.12); color: var(--score-high); }
.score-mid { background: rgba(255,170,0,0.12); color: var(--score-mid); }
.score-low { background: rgba(255,71,87,0.12); color: var(--score-low); }

/* Topic header */
.topic-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 1rem;
  margin-bottom: 0.75rem;
}
.topic-title {
  font-size: 1.05rem;
  font-weight: 700;
  line-height: 1.5;
  flex: 1;
}
.topic-meta {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  flex-wrap: wrap;
}
.topic-original {
  font-size: 0.78rem;
  color: var(--text-muted);
  margin-bottom: 0.5rem;
  padding-left: 0.75rem;
  border-left: 2px solid var(--border);
}
.topic-angle {
  font-size: 0.85rem;
  color: var(--text-muted);
  line-height: 1.5;
  margin-bottom: 0.75rem;
}
.topic-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  flex-wrap: wrap;
}
.topic-info {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  font-size: 0.78rem;
  color: var(--text-muted);
}
.topic-info a {
  color: var(--accent);
  text-decoration: none;
  transition: opacity 0.2s;
}
.topic-info a:hover { opacity: 0.8; }

/* Generate button */
.gen-btn {
  padding: 0.45rem 1rem;
  border-radius: 8px;
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text-muted);
}
.gen-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(255,107,53,0.08);
  transform: scale(1.03);
}
.gen-btn.active {
  border-color: var(--new-badge);
  color: var(--new-badge);
  background: rgba(0,214,143,0.08);
}
.gen-btn.generating {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(255,107,53,0.08);
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 4rem 2rem;
  color: var(--text-muted);
}
.empty-icon { font-size: 3rem; margin-bottom: 1rem; }
.empty-title { font-size: 1.2rem; font-weight: 600; color: var(--text); margin-bottom: 0.5rem; }
.empty-desc { font-size: 0.9rem; line-height: 1.6; }

/* Loading */
.loading-overlay {
  position: fixed;
  inset: 0;
  background: rgba(10,10,15,0.85);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 1.5rem;
  backdrop-filter: blur(8px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.loading-overlay.visible {
  opacity: 1;
  pointer-events: all;
}
.loader {
  width: 48px;
  height: 48px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
.loading-text {
  font-size: 0.95rem;
  color: var(--text-muted);
}
.loading-sub {
  font-size: 0.8rem;
  color: var(--text-muted);
  opacity: 0.6;
}

/* Article modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(10,10,15,0.9);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(8px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.modal-overlay.visible {
  opacity: 1;
  pointer-events: all;
}
.modal-content {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 2rem;
  max-width: 800px;
  width: 90%;
  max-height: 85vh;
  overflow-y: auto;
  position: relative;
}
.modal-close {
  position: absolute;
  top: 1rem;
  right: 1rem;
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  transition: all 0.2s;
}
.modal-close:hover {
  border-color: var(--score-low);
  color: var(--score-low);
}
.article-title {
  font-size: 1.3rem;
  font-weight: 800;
  margin-bottom: 0.5rem;
  line-height: 1.4;
}
.article-meta {
  font-size: 0.82rem;
  color: var(--text-muted);
  margin-bottom: 1.5rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--border);
}
.article-body {
  font-size: 0.95rem;
  line-height: 1.85;
  color: #ccc;
}
.article-body h3 {
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--text);
  margin: 1.5rem 0 0.75rem;
}
.article-body p {
  margin-bottom: 1rem;
}
.compliance-section {
  margin-top: 1.5rem;
  padding-top: 1rem;
  border-top: 1px solid var(--border);
}
.compliance-title {
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--score-mid);
  margin-bottom: 0.75rem;
}
.compliance-item {
  font-size: 0.85rem;
  color: var(--text-muted);
  padding: 0.5rem 0;
  border-bottom: 1px solid rgba(255,255,255,0.03);
}
.compliance-item:last-child { border-bottom: none; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* Responsive */
@media (max-width: 640px) {
  .container { padding: 1rem; }
  .header { margin-bottom: 1.5rem; }
  .logo-text h1 { font-size: 1.2rem; }
  .topic-card { padding: 1rem; }
  .topic-title { font-size: 0.95rem; }
}

/* Backend Status */
.backend-status {
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  padding: 6px 12px;
  border-radius: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  font-size: 0.75rem;
  transition: all 0.2s;
}
.backend-status:hover { background: var(--surface2); }
.backend-dot {
  width: 8px; height: 8px; border-radius: 50%;
}
.backend-dot.green { background: var(--new-badge); box-shadow: 0 0 6px var(--new-badge); }
.backend-dot.yellow { background: var(--score-mid); }
.backend-dot.gray { background: var(--text-muted); }
.backend-dot.red { background: var(--score-low); }
.backend-label { color: var(--text-muted); }

/* Log Panel */
.log-panel {
  margin-top: 2rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.log-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 16px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  font-size: 0.85rem;
  font-weight: 600;
}
.log-close {
  background: none; border: none; color: var(--text-muted);
  cursor: pointer; font-size: 1rem;
}
.log-list {
  max-height: 300px;
  overflow-y: auto;
  padding: 8px;
}
.log-entry {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 0.78rem;
  color: var(--text-muted);
}
.log-entry:hover { background: var(--surface2); }
.log-time { color: var(--text-muted); opacity: 0.6; white-space: nowrap; }
.log-icon { flex-shrink: 0; }
.log-msg { color: var(--text); }
.log-detail { color: var(--accent2); opacity: 0.7; }
.log-info .log-msg { color: var(--text); }
.log-warn .log-msg { color: var(--score-mid); }
.log-error .log-msg { color: var(--score-low); }
.log-success .log-msg { color: var(--new-badge); }
</style>
</head>
<body>
<div class="bg-grid"></div>

<!-- Loading Overlay -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loader"></div>
  <div class="loading-text" id="loadingText">正在抓取资讯...</div>
  <div class="loading-sub" id="loadingSub">模拟 Foodaily 内容生产流程</div>
</div>

<!-- Article Modal -->
<div class="modal-overlay" id="articleModal">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modalBody"></div>
  </div>
</div>

<div class="container">
  <!-- Header -->
  <div class="header">
    <div class="logo-group">
      <div class="logo-icon">🍽</div>
      <div class="logo-text">
        <h1>Foodaily 内容生产系统</h1>
        <p>资讯抓取 → 选题筛选 → 内容生成 → 合规审核</p>
      </div>
    </div>
    <button class="refresh-btn" id="refreshBtn" onclick="runPipeline()">
      <span class="refresh-icon">↻</span>
      刷新选题
    </button>
    <div class="backend-status" id="backendStatus" title="后端连接状态" onclick="toggleLogPanel()">
      <span class="backend-dot gray" id="backendDot"></span>
      <span class="backend-label" id="backendLabel">检测中...</span>
    </div>
  </div>

  <!-- Pipeline -->
  <div class="pipeline">
    <div class="pipeline-step" id="pipe1">
      <span>🔍</span> 资讯抓取
    </div>
    <span class="pipeline-arrow">→</span>
    <div class="pipeline-step" id="pipe2">
      <span>🎯</span> 选题筛选
    </div>
    <span class="pipeline-arrow">→</span>
    <div class="pipeline-step" id="pipe3">
      <span>✍️</span> 内容生成
    </div>
    <span class="pipeline-arrow">→</span>
    <div class="pipeline-step" id="pipe4">
      <span>🛡️</span> 合规审核
    </div>
  </div>

  <!-- Status Bar -->
  <div class="status-bar">
    <div class="status-item">
      <div class="status-dot gray" id="statusDot"></div>
      <span class="status-label">状态：</span>
      <span class="status-value" id="statusText">待刷新</span>
    </div>
    <div class="status-item">
      <span class="status-label">资讯数：</span>
      <span class="status-value" id="newsCount">0</span>
    </div>
    <div class="status-item">
      <span class="status-label">选题数：</span>
      <span class="status-value" id="topicCount">0</span>
    </div>
    <div class="status-item">
      <span class="status-label">本轮新增：</span>
      <span class="status-value" id="newCount" style="color:var(--new-badge)">0</span>
    </div>
    <div class="status-item">
      <span class="status-label">上次刷新：</span>
      <span class="status-value" id="lastUpdate">-</span>
    </div>
  </div>

  <!-- Filter -->
  <div class="filter-bar" id="filterBar" style="display:none">
    <div class="filter-chip active" data-filter="all" onclick="setFilter('all')">全部</div>
    <div class="filter-chip" data-filter="new" onclick="setFilter('new')">🆕 本轮新增</div>
    <div class="filter-chip" data-filter="score5" onclick="setFilter('score5')">⭐ 5分</div>
    <div class="filter-chip" data-filter="score4" onclick="setFilter('score4')">🔥 4分+</div>
    <div class="filter-chip" data-filter="recommend" onclick="setFilter('recommend')">✅ 推荐</div>
  </div>

  <!-- Topic List -->
  <div id="topicList">
    <div class="empty-state">
      <div class="empty-icon">📡</div>
      <div class="empty-title">等待资讯抓取</div>
      <div class="empty-desc">点击右上角「刷新选题」按钮，启动资讯侦察员<br>从全球食品行业信息源抓取最新资讯</div>
    </div>
  </div>

  <!-- Log Panel -->
  <div id="logPanel" class="log-panel" style="display:none">
    <div class="log-header">
      <span>📋 运行日志</span>
      <button class="log-close" onclick="toggleLogPanel()">✕</button>
    </div>
    <div id="logList" class="log-list"></div>
  </div>
</div>

<script>
// ============ STATE ============
let currentTopics = [];
let previousTopicIds = new Set();
let currentFilter = 'all';
let isRunning = false;

// ============ LOG SYSTEM ============
const logs = [];
function logger(type, message, detail) {
  const icons = { info: 'ℹ️', warn: '⚠️', error: '❌', success: '✅' };
  const entry = {
    time: new Date().toLocaleTimeString('zh-CN'),
    type,
    message,
    detail: detail || '',
  };
  logs.unshift(entry);
  if (logs.length > 50) logs.pop();
  console.log(`[${type.toUpperCase()}] ${message} ${detail}`);

  // Update log panel if visible
  const logPanel = document.getElementById('logPanel');
  if (logPanel) {
    const logList = document.getElementById('logList');
    if (logList) {
      logList.innerHTML = logs.map(l =>
        `<div class="log-entry log-${l.type}">
          <span class="log-time">${l.time}</span>
          <span class="log-icon">${icons[l.type] || '•'}</span>
          <span class="log-msg">${l.message}</span>
          ${l.detail ? `<span class="log-detail">${l.detail}</span>` : ''}
        </div>`
      ).join('');
    }
  }
}

function generateNewsItems() {
  const items = [];
  const now = new Date();
  const usedIndices = new Set();

  // 从每个类别随机选取1-3条
  NEWS_TEMPLATES.forEach((template, catIdx) => {
    const count = Math.floor(Math.random() * 2) + 1;
    const available = [...Array(template.titles.length).keys()];

    for (let i = 0; i < count && available.length > 0; i++) {
      const randArrIdx = Math.floor(Math.random() * available.length);
      const titleIdx = available.splice(randArrIdx, 1)[0];

      const source = SOURCES[Math.floor(Math.random() * SOURCES.length)];
      const hoursAgo = Math.floor(Math.random() * 72) + 1;
      const pubDate = new Date(now - hoursAgo * 3600000);

      items.push({
        title: template.titles[titleIdx],
        date: pubDate.toISOString().slice(0, 16).replace('T', ' '),
        source: source.name,
        url: source.url,
        category: template.category,
        tags: template.tags,
        summary: generateSummary(template.titles[titleIdx], template.category),
        hoursAgo: hoursAgo
      });
    }
  });

  // Sort by date
  items.sort((a, b) => new Date(b.date) - new Date(a.date));
  return items;
}

// ============ TOPIC EVALUATOR ============
function evaluateTopics(newsItems) {
  return newsItems.map((item, idx) => {
    const score = calculateScore(item);
    const recommend = score >= 3;
    const newTitle = rewriteTitle(item);
    const angle = generateAngle(item);

    return {
      id: `T${String(idx + 1).padStart(3, '0')}`,
      original_title: item.title,
      new_title: newTitle,
      angle: angle,
      score: score,
      recommend: recommend,
      url: item.url,
      source: item.source,
      date: item.date,
      category: item.category,
      tags: item.tags,
      generate_article: false,
      isNew: false // will be set by diff logic
    };
  });
}

function calculateScore(item) {
  let score = 3;
  if (item.category === '趋势' || item.category === '法规') score += 1;
  if (item.tags && item.tags.includes('功能食品')) score += 0.5;
  if (item.tags && item.tags.includes('植物基')) score += 0.5;
  if (item.hoursAgo <= 24) score += 0.5;

  // 英文标题额外加分（真实抓取的数据更有价值）
  const title = item.title || '';
  const isEnglish = /^[A-Za-z]/.test(title);
  if (isEnglish) score += 0.3;

  // 包含关键热门词加分
  const hotWords = ['plant-based', 'AI', 'sustainability', 'protein', 'fermentation',
                    'alternative', 'functional', 'personalized', 'supply chain',
                    '植物基', '功能食品', '可持续', '替代蛋白', '精准营养'];
  if (hotWords.some(w => title.toLowerCase().includes(w.toLowerCase()))) score += 0.5;

  if (Math.random() > 0.6) score += 0.5; // editorial judgment factor
  return Math.min(5, Math.max(1, Math.round(score)));
}

// ============ DIFF LOGIC ============
function markNewTopics(topics) {
  const currentIds = new Set(topics.map(t => t.original_title));

  topics.forEach(t => {
    // If this title wasn't in the previous run, mark as new
    if (!previousTopicIds.has(t.original_title)) {
      t.isNew = true;
    }
  });

  // Update previous set for next run
  previousTopicIds = currentIds;
  return topics;
}

async function fetchRealNews() {
  // 触发抓取
  const scrapeResp = await fetch(API_BASE + '/api/scrape?force=1', { method: 'POST' });
  const scrapeData = await scrapeResp.json();

  if (scrapeData.status === 'cached') {
    // 直接返回缓存
    return scrapeData.items;
  }

  // 等待抓取完成（轮询）
  for (let i = 0; i < 60; i++) {
    await delay(2000);
    const statusResp = await fetch(API_BASE + '/api/status');
    const statusData = await statusResp.json();

    if (!statusData.scraping) {
      // 抓取完成，获取结果
      const newsResp = await fetch(API_BASE + '/api/news?per_page=100');
      const newsData = await newsResp.json();
      return newsData.items || [];
    }
  }

  // 超时，返回已有的缓存
  const newsResp = await fetch(API_BASE + '/api/news?per_page=100');
  const newsData = await newsResp.json();
  return newsData.items || [];
}

  for (const [cat, keywords] of Object.entries(categoryMap)) {
    if (keywords.some(kw => titleLower.includes(kw))) {
      return cat;
    }
  }

  // 根据source category回退
  const sourceCatMap = {
    '行业深度': '品牌', '行业导航': '趋势', '行业商业': '品牌',
    '行业技术': '技术', '行业资讯': '趋势', '趋势追踪': '趋势',
    '新闻稿': '新品', '新品发布': '新品', '新品&评测': '新品',
    '综合分析': '趋势', '营养配料': '原料', '乳制品': '新品',
    '饮料行业': '新品', '欧洲食品': '趋势', '食品商业': '品牌',
    '糖巧行业': '新品',
  };
  return sourceCatMap[sourceCategory] || '趋势';
}

function generateRegionTag(region) {
  const map = { '北美': '欧美', '欧洲': '欧美', '日本': '日本', '国内': '国内' };
  return map[region] || '国际';
}

async function runPipeline() {
  if (isRunning) return;
  isRunning = true;

  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');

  // 检测后端
  const backendOk = await checkBackend();

  let newsItems = [];

  // Step 1: Scouting
  setPipeline(1);

  if (backendOk && useRealAPI) {
    showLoading('资讯侦察员正在抓取...', '从真实信息源中采集最新资讯（可能需要1-2分钟）');
    try {
      const realNews = await fetchRealNews();
      // 转换真实数据为前端格式
      newsItems = realNews.map(item => ({
        title: item.title,
        date: item.date || '',
        source: item.source,
        url: item.url,
        category: classifyNewsCategory(item.title, item.category),
        tags: [generateRegionTag(item.region || ''), item.category],
        summary: item.summary || '',
        hoursAgo: item.date ? Math.max(1, Math.floor((Date.now() - new Date(item.date).getTime()) / 3600000)) : 48,
      }));
      logger('success', '真实抓取完成', newsItems.length + '条资讯');
    } catch (e) {
      logger('error', '真实抓取失败，回退模拟数据', e.message);
      newsItems = generateNewsItems();
    }
  } else {
    showLoading('资讯侦察员正在抓取...', '使用模拟数据（启动后端可获取真实资讯）');
    await delay(1500);
    newsItems = generateNewsItems();
  }

  document.getElementById('newsCount').textContent = newsItems.length;
  updateStatus('yellow', '选题筛选中...');

  // Step 2: Selection
  setPipeline(2);
  showLoading('选题策划专家正在评估...', '对 ' + newsItems.length + ' 条资讯进行选题判断');
  await delay(1000);

  let topics = evaluateTopics(newsItems);

  // Mark new topics by diffing with previous
  topics = markNewTopics(topics);

  // Only keep recommended topics
  const recommended = topics.filter(t => t.recommend);

  currentTopics = recommended;
  document.getElementById('topicCount').textContent = recommended.length;
  document.getElementById('newCount').textContent = recommended.filter(t => t.isNew).length;
  document.getElementById('lastUpdate').textContent = new Date().toLocaleString('zh-CN');
  document.getElementById('filterBar').style.display = 'flex';

  hideLoading();
  renderTopics();
  setPipeline(0); // reset pipeline display
  updateStatus('green', '就绪');

  btn.classList.remove('spinning');
  isRunning = false;
}

// ============ ARTICLE GENERATION ============
async function generateArticle(topicId) {
  const topic = currentTopics.find(t => t.id === topicId);
  if (!topic) return;

  const btn = document.querySelector(`[data-topic-id="${topicId}"] .gen-btn`);
  if (btn) {
    btn.classList.add('generating');
    btn.textContent = '生成中...';
  }

  setPipeline(3);
  showLoading('内容写手正在撰写...', topic.new_title);
  await delay(2500);

  const article = writeArticle(topic);

  setPipeline(4);
  showLoading('合规审核员正在检查...', '审核功效宣称 / 法规风险 / 事实准确性');
  await delay(1200);

  const compliance = reviewCompliance(article);

  hideLoading();
  setPipeline(0);

  // Update topic state
  topic.generate_article = true;
  if (btn) {
    btn.classList.remove('generating');
    btn.classList.add('active');
    btn.textContent = '✓ 已生成';
    btn.onclick = () => showModal(topic, article, compliance);
  }

  showModal(topic, article, compliance);
}

            `从产品力来看，${pick(d2.products)}的竞争已经开始从配方层面延伸到体验层面。谁能在"有效"和"好喝/好吃"之间找到最佳平衡，谁就拿到了品类定义权。这不是理论推断，${pick(d1.brands)}和${pick(d2.brands)}的市场表现已经给出了答案。`,
          ]
        },
        {
          heading: `谁在做，谁在跟，谁在等`,
          paragraphs: [
            `梳理这个赛道的玩家图谱，会发现一个有趣的结构：头部品牌在抢定义权，新锐品牌在抢心智，而渠道方在用自己的选品逻辑倒逼上游。三股力量交织之下，${tag}赛道的竞争烈度远超表面。`,
            `头部阵营中，${pickN(d1.brands, 3).join('、')}都在${pick(d1.products)}赛道有明确布局。但策略差异很大：${d1.brands[0]}走的是"技术驱动+场景教育"路线，${d1.brands[1] ? d1.brands[1] : '另一家'}更偏向"渠道铺货+价格带覆盖"，${d1.brands[2] ? d1.brands[2] : '第三家'}则选择在细分人群上做深度穿透。`,
            `新锐品牌方面，过去两年涌入${tag}赛道的新品牌超过50家，但存活率不到30%。原因很简单：${pick(d1.products)}的壁垒不在配方，而在供应链和渠道。能持续供货、能进入核心渠道、能让消费者形成复购习惯——这三件事，哪件都不容易。`,
            `${brand || '头部玩家'}的这次动作，大概率会引发一波跟随——但跟得上的前提不是复制产品，而是理解为什么这么做。同质化的坑，${tag}赛道已经踩过一轮了。上一轮"人人做${pick(d1.products)}"的结果是：价格战、利润薄、消费者审美疲劳。这一次，看谁能在差异化上跑出来。`,
            `值得注意的是，渠道端的变化也在加速。${pick(d1.brands)}在便利店渠道的增速超过35%，山姆、盒马等渠道对${pick(d1.products)}的选品标准也在提高——不只是"有没有功能"，更看"消费者会不会复购"。这意味着，光有产品力不够，还要有持续的产品迭代能力。`,
          ]
        },
        {
          heading: `品类还有多少想象空间`,
          paragraphs: [
            `如果只看当下的竞争格局，${tag}赛道似乎已经相当拥挤。但如果把视角拉长，会发现这个品类可能才刚刚开始。${pick(d1.numbers)}——这个数字对应的不是一个静态市场，而是一个正在快速扩容、结构持续变化的增量市场。`,
            `从消费端来看，${tag2 ? tag + '与' + tag2 + '的交叉' : '品类创新'}正在打开新的场景。${pick(d2.products)}不再是单一场景的产品，而是渗透到了日常饮食、运动恢复、职场补给等多个生活切面。这意味着${pick(d1.products)}的目标人群和消费频次都有大幅提升的空间。`,
            `从供给端来看，${pick(d1.brands)}的技术储备和${pick(d2.brands || d1.brands)}的渠道能力，正在为品类创新提供更多可能性。${pick(d1.numbers)}——当上游的技术突破遇上渠道端的选品升级，品类跃迁的时机可能比想象中更近。`,
            `但机会永远伴随着风险。${tag}赛道的下一个挑战不是"能不能做出来"，而是"能不能做出来之后还活得下去"。复购率、供应链稳定性、消费者教育的持续性，这些才是决定品类能不能从"风口"变成"赛道"的关键变量。`,
          ]
        },
      ],
      "法规": () => [
        {
          heading: `新规到底改了什么`,
          paragraphs: [
            `这次${topic.original_title.slice(0, 30)}...的核心调整，主要集中在三个层面：一是原料准入标准的更新，二是功能宣称的合规边界重新划定，三是备案与审批流程的优化。每一项都直接影响企业的产品开发节奏和市场进入策略。`,
            `具体来看，原料准入方面，新规对${tag}领域的${pick(d1.products)}做出了更明确的界定。此前处于灰色地带的部分原料，现在有了清晰的分类和审批路径。这对已经在相关领域有技术储备的企业来说是利好，但对还在观望的企业意味着合规成本上升。`,
            `功能宣称方面，新规进一步收紧了"功效暗示"的表达空间。${pick(d1.products)}相关产品在营销中常用的部分表述，将不再被允许。企业需要重新梳理产品文案和宣传策略，避免触碰广告法红线。`,
            `备案与审批流程方面，新规在缩短周期的同时增加了事后监管力度。这意味着"先上车后补票"的思路行不通了，但合规先行者反而能获得更快的市场准入。`,

        {

            `但对中小品牌来说，新规的影响更为直接。${pick(d1.products)}领域的小品牌普遍面临两个问题：一是合规调整需要投入研发和法务资源，对现金流是考验；二是合规后的产品差异化空间可能被压缩，同质化竞争加剧。`,
            `${pick(d1.numbers)}。在这个基数上，法规调整的连锁反应会非常快。预计未来3-6个月内，${tag}赛道会经历一轮产品迭代——部分不合规产品退场，合规升级产品补位，市场格局重新洗牌。`,
          ]
        },
        {
          heading: `合规先行者的窗口期`,
          paragraphs: [
            `每一次法规更新，都意味着一次短暂的窗口期。率先完成合规调整的企业，不仅能避免踩坑，更能在渠道端获得先发优势。历史反复证明：在食品行业，合规从来不是成本，而是最便宜的品牌保险。`,
            `从${pick(d1.brands)}的经验来看，提前布局合规的回报是实实在在的：渠道方的选品标准在法规调整后往往会收紧，合规产品天然获得了更高的上架概率。同时，消费者在敏感时期也更倾向于选择"有备案""有审批"的产品，这本身就是一种信任背书。`,
            `但窗口期不会太长。预计${tag}赛道的主要玩家将在6-9个月内完成合规升级，届时先发优势将被大幅稀释。所以，对还没有启动合规调整的企业来说，现在不是"要不要做"的问题，而是"还能不能赶上"的问题。`,
            `从更长期的视角看，${tag}领域的法规体系正在走向更成熟、更规范的方向。这意味着未来新原料、新功能的准入门槛会更清晰，合规成本也会随着标准化而下降。但对当前这个过渡期而言，速度就是一切。`,
          ]
        },
      ],
      "趋势": () => [
        {
          heading: `增长数据背后的真实信号`,
          paragraphs: [
            `${tag}赛道的增长数据确实好看，但拆开来看，增长的来源并不均匀。${tag2 ? tag2 + '相关' : '核心'}品类的增速远超大盘，而一些传统强势品类已经开始失速。这不是简单的"消费升级"或"消费降级"能解释的——它更像是一次结构性的需求迁移。`,
            `${pick(d1.numbers)}。如果只看总量，结论是"市场在涨"。但如果分品类、分渠道、分人群来看，结论会截然不同：${pick(d1.products)}的增速是大盘的2倍以上，但${pick(d2.products)}的增长已经接近停滞。这意味着增量并不均匀，有些品类在狂奔，有些品类在掉队。`,
            `从渠道来看，线上和线下的增长驱动也完全不同。线上靠的是新品迭代和内容种草，${pick(d1.brands)}在天猫/抖音渠道的增速超过40%；线下靠的是渠道渗透和价格带覆盖，${pick(d2.brands || d1.brands)}在便利店的渗透率仍在持续提升。两种增长模式对应的是完全不同的品牌能力模型。`,
            `从人群来看，${tag}赛道的消费者正在分化为至少三个截然不同的群体：追求功能性的理性消费者、追求体验感的年轻消费者、追求性价比的大众消费者。每个群体的决策逻辑和价格敏感度都不一样，用一套策略打天下已经行不通了。`,
          ]
        },
        {
          heading: `头部品牌的不同解法`,
          paragraphs: [
            `面对同一组数据，${tag}赛道的头部品牌选择了截然不同的应对策略。${pickN(d1.brands, 3).join('、')}代表了三种典型的打法，每种打法都有其合理性，但也各有隐忧。`,
            `${d1.brands[0] || '品牌A'}的策略是"技术驱动+品类定义"。它在${pick(d1.products)}上的投入不只是在做产品，而是在定义${tag}赛道的"好"是什么标准。这种策略的回报周期长，但一旦建立起品类认知壁垒，后来者很难撼动。${pick(d1.numbers)}——这就是品类定义者的红利。`,
            `${d1.brands[1] || '品牌B'}的策略是"渠道渗透+价格带覆盖"。它在${pick(d1.products)}上的核心思路是用更密集的渠道触达和更灵活的定价策略快速占领市场。这种策略在增量阶段非常有效，但一旦市场进入存量竞争，利润空间会被持续压缩。`,
            `${d1.brands[2] || '品牌C'}的策略是"细分人群+深度穿透"。它没有试图覆盖所有消费者，而是选择在${tag2 || '特定人群'}上做深度运营。这种策略的品类天花板相对较低，但在细分领域的品牌忠诚度和复购率往往更高。`,
          ]
        },
        {
          heading: `增长的下一站在哪`,
          paragraphs: [
            `如果只看增速，几乎每个品类都能找到一两个亮点。但真正的问题是：这个增长是靠流量驱动的，还是靠复购驱动的？前者来得快走得也快，后者才是品牌能长期依靠的底座。`,
            `${pick(d1.numbers)}。数据显示，${tag}赛道中，复购率排名前20%的品牌，贡献了超过一半的品类增量。这个信号，比任何趋势报告都更值得重视。复购率的背后，是产品力、品牌认知和消费习惯的综合作用——这三件事，没有一件是可以速成的。`,
            `从品类的角度看，增长的下一个突破口可能来自${tag2 ? tag + '与' + tag2 + '的交叉创新' : '品类边界的打破'}。${pick(d1.products)}不再只是一个独立品类，而是正在向${pick(d2.products)}等领域渗透。当品类的边界开始模糊，最先跑出来的往往是那些敢于跨界、善于融合的品牌。`,
            `但机会永远与风险并存。${tag}赛道的下一个增长点，不会再来一次"人人都能吃到"的红利期，而是需要品牌在精准定位、供应链效率、消费者洞察之间找到真正属于自己的那个交叉点。这比追风口难得多，但也踏实得多。`,
          ]
        },
      ],
      "品牌": () => [
        {
          heading: `${brand || '品牌'}做了什么，为什么这么做`,
          paragraphs: [
            `${brand || '头部品牌'}这次的动作，表面上是产品/渠道层面的调整，实际上是在重新定义自己在${tag}赛道中的位置。当行业从增量竞争进入存量竞争，每一个落子都必须同时考虑"我现在在哪"和"我要去哪"。`,
            `从具体动作来看，${brand || '这家企业'}的核心策略可以概括为三个关键词：聚焦、延展、护城河。聚焦——在${pick(d1.products)}的主赛道上继续加大投入；延展——向${pick(d2.products)}等相邻品类试探；护城河——通过${pick(d1.products)}的技术壁垒和渠道积累，构建竞争对手难以复制的组合优势。`,
            `${pick(d1.numbers)}。在这个市场体量下，${brand || '这家企业'}的布局逻辑不是"做多"，而是"做深"。${pick(d1.products)}赛道的竞争已经过了靠单一爆款打天下的阶段，现在考验的是系统性能力——产品迭代速度、供应链响应效率、渠道运营精度，缺一不可。`,
            `值得注意的是，${brand || '这家企业'}在${pick(d2.products)}上的布局是"适当外延"而非"全面转向"。这和${pick(d1.brands.filter(b => b !== brand)) || '部分同行'}的激进跨界策略形成了鲜明对比——后者在多个赛道同时铺开，但每个赛道都缺乏足够的深度。`,

        },
        {
          heading: `跨界案例对比：成与败的底层逻辑`,
          paragraphs: [
            `传统企业跨界在食品行业并不罕见，但结果天差地别。梳理${tag}赛道近年来的跨界案例，可以提炼出一个清晰的规律：成功的关键不在于跨不跨，而在于怎么跨。`,
            `以${pick(d1.brands.filter(b => b !== brand))}为例，它的跨界策略是"围绕核心能力做同心圆扩展"。从${pick(d1.products)}到${pick(d2.products)}，每一步都在原有技术能力和渠道资源的基础上延伸，而不是跳到一个完全陌生的领域。结果是：跨界产品和核心业务形成了协同效应，1+1>2。`,
            `反观${pick(d2.brands || d1.brands.filter(b => b !== brand))}，它的跨界更像是"哪里热闹去哪里"。从${pick(d2.products || d1.products)}到${pick(d1.products)}，每一步都踩在了风口上，但每一步都缺乏足够的积累和深度。结果是：新品做了不少，但没有一个真正站稳脚跟，资源分散、主业失焦。`,
            `${pick(d1.numbers)}。这个数据告诉我们，跨界本身不是问题，问题在于跨界是否依托了企业的核心能力。${brand || '这家企业'}这次的布局，至少在逻辑上是通的——它不是在追逐风口，而是在既有能力的基础上做合理延伸。`,
          ]
        },
        {
          heading: `主业根基与增长天平`,
          paragraphs: [
            `回到核心问题：${brand || '这家企业'}跨界会不会影响主业？从数据来看，至少目前答案是"不会"。${pick(d1.numbers)}——核心品类依然是利润的主要来源，跨界业务虽然增速快，但占比不高。`,
            `但需要警惕的是，跨界业务的资源占用往往是隐性的。研发精力、渠道资源、管理带宽——这些看似"共享"的资源，在跨界扩张的过程中会被不知不觉地稀释。${pick(d1.brands.filter(b => b !== brand))}的前车之鉴就在眼前：跨界五年，四次亏损，最终陷入"样样都做，样样都不精"的困境。`,
            `${brand || '这家企业'}显然也意识到了这个风险。从布局节奏来看，它选择了"小步试探+快速验证"而非"全面铺开"的模式。子公司独立运作、产品先在线上渠道试水、不直接使用主品牌——这些都是为了在探索新增长点的同时，最大程度保护主业的基本盘。`,
            `总而言之，${brand || '这家企业'}的跨界尝试并非"翻车预定"或"稳赚不赔"，而是一场基于自身优势的理性试探。能否成为新增长极，关键在于平衡主业与跨界、将核心能力转化为跨品类的产品竞争力。`,
          ]
        },
      ],
      "技术": () => [
        {
          heading: `从实验室到货架，中间隔着什么`,
          paragraphs: [
            `${topic.original_title}，听起来很美好。但任何一项食品技术的商业化，都要回答三个问题：能不能稳定量产、成本能不能打下来、消费者愿不愿意为它付钱。目前来看，前两个问题正在被逐步解决，第三个才是真正的硬仗。`,
            `量产方面，${pick(d1.brands)}已经建成了${tag}领域的示范产线，年产能达到${pick(d1.numbers).match(/\d+/)?.[0] || '可观'}级别。这意味着"能不能做出来"的问题已经基本解决，但"能不能在保证品质的前提下持续稳定产出"仍然是关键挑战。食品行业的量产从来不是简单的"复制实验室条件"，规模化过程中的品质波动是所有新技术都会遇到的瓶颈。`,
            `成本方面，${pick(d1.numbers)}。这个数据说明${tag}技术的成本曲线正在快速下降，但和传统工艺相比仍有差距。${pick(d1.brands)}的策略是通过工艺优化和规模效应持续压缩成本，预计在未来2-3年内达到与传统方案持平的水平。`,
            `但最大的不确定性在消费端。${tag}技术的商业化最终要回答的问题是：消费者愿不愿意为${pick(d1.products)}付钱？愿意付多少？这个答案不是靠市场调研能得出的，只能靠真实的产品和市场反馈来验证。`,
          ]
        },
        {
          heading: `谁最先受益：研发强者还是应用快者`,
          paragraphs: [

// 从标题中提取品牌名（简单启发式）
function extractBrand(title) {
  const patterns = [
    /^([A-Za-z\u4e00-\u9fa5]+?)(推出|发布|上市|上新|投资|收购|加码|押注|布局)/,
    /^([A-Za-z\u4e00-\u9fa5]+?)(的|集团|公司)/,
  ];
  for (const p of patterns) {
    const m = title.match(p);
    if (m && m[1].length >= 2 && m[1].length <= 8) return m[1];
  }
  return '';
}

function reviewCompliance(article) {
  const risks = [];
  const suggestions = [];

  // Simulated compliance check
  const fullText = article.sections.map(s =>
    s.paragraphs ? s.paragraphs.join('') : (s.content || '')
  ).join('');

  if (fullText.includes('治疗') || fullText.includes('治愈')) {
    risks.push('文中可能涉及医疗功效暗示，需替换为合规表述');
    suggestions.push('将"治疗/治愈"替换为"改善/辅助"等非医疗化表述');
  }
  if (fullText.includes('最好') || fullText.includes('最优')) {
    risks.push('极限用语可能违反广告法');
    suggestions.push('避免使用"最好/最优"等极限词');
  }

  // General compliance notes
  risks.push('请确认文中所有品牌、产品名称与数据来源的准确性');
  suggestions.push('建议在发布前由法务团队做最终审核');

  return { risk_points: risks, suggestions: suggestions };
}

// ============ UI HELPERS ============
function setPipeline(activeStep) {
  for (let i = 1; i <= 4; i++) {
    const el = document.getElementById('pipe' + i);
    el.classList.remove('active', 'done');
    if (i < activeStep) el.classList.add('done');
    else if (i === activeStep) el.classList.add('active');
  }
}

function updateStatus(color, text) {
  document.getElementById('statusDot').className = 'status-dot ' + color;
  document.getElementById('statusText').textContent = text;
}

function showLoading(text, sub) {
  document.getElementById('loadingText').textContent = text;
  document.getElementById('loadingSub').textContent = sub || '';
  document.getElementById('loadingOverlay').classList.add('visible');
}

function hideLoading() {
  document.getElementById('loadingOverlay').classList.remove('visible');
}

function delay(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function setFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll('.filter-chip').forEach(chip => {
    chip.classList.toggle('active', chip.dataset.filter === filter);
  });
  renderTopics();
}

  const list = document.getElementById('topicList');
  let filtered = [...currentTopics];

  if (currentFilter === 'new') filtered = filtered.filter(t => t.isNew);
  else if (currentFilter === 'score5') filtered = filtered.filter(t => t.score === 5);
  else if (currentFilter === 'score4') filtered = filtered.filter(t => t.score >= 4);
  else if (currentFilter === 'recommend') filtered = filtered.filter(t => t.recommend);

  if (filtered.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🔍</div>
        <div class="empty-title">无匹配选题</div>
        <div class="empty-desc">当前筛选条件下没有选题，试试其他筛选条件</div>
      </div>`;
    return;
  }

  list.innerHTML = '<div class="topic-list">' + filtered.map(topic => {
    const scoreClass = topic.score >= 5 ? 'score-high' : topic.score >= 4 ? 'score-mid' : 'score-low';
    const newClass = topic.isNew ? 'is-new' : '';
    const genBtnClass = topic.generate_article ? 'gen-btn active' : 'gen-btn';
    const genBtnText = topic.generate_article ? '✓ 已生成' : '生成文章';
    const genBtnOnclick = topic.generate_article
      ? `onclick="showModalForTopic('${topic.id}')"`
      : `onclick="generateArticle('${topic.id}')"`;

    return `
      <div class="topic-card ${newClass}" data-topic-id="${topic.id}" data-new="${topic.isNew}" data-score="${topic.score}" data-recommend="${topic.recommend}">
        <div class="topic-header">
          <div class="topic-title">${topic.new_title}</div>
          <div class="topic-meta">
            ${topic.isNew ? '<span class="new-badge">🆕 新增</span>' : ''}
            <span class="score-badge ${scoreClass}">⭐ ${topic.score}</span>
          </div>
        </div>
        <div class="topic-original">原文：${topic.original_title}</div>
        <div class="topic-angle">📌 ${topic.angle}</div>
        <div class="topic-footer">
          <div class="topic-info">
            <span>${topic.source}</span>
            <span>·</span>
            <span>${topic.category}</span>
            <span>·</span>
            <span>${topic.date}</span>
            ${topic.url && topic.url.startsWith('http') ? `<span>·</span><a href="${topic.url}" target="_blank">原文链接 ↗</a>` : ''}
          </div>
          <button class="${genBtnClass}" ${genBtnOnclick}>${genBtnText}</button>
        </div>
      </div>`;
  }).join('') + '</div>';
}

function showModalForTopic(topicId) {
  const topic = currentTopics.find(t => t.id === topicId);
  if (!topic || !topic._article) return;
  showModal(topic, topic._article, topic._compliance);
}

function showModal(topic, article, compliance) {
  // Cache for reopening
  topic._article = article;
  topic._compliance = compliance;

  const body = document.getElementById('modalBody');
  const articleHtml = article.sections.map(s => {
    const heading = s.heading ? `<h3>${s.heading}</h3>` : '';
    // 支持新的paragraphs数组格式和旧的content字符串格式
    const content = s.paragraphs
      ? s.paragraphs.map(p => `<p>${p}</p>`).join('')
      : `<p>${s.content}</p>`;
    return heading + content;
  }).join('');

  const complianceHtml = compliance.risk_points.length > 0 ? `
    <div class="compliance-section">
      <div class="compliance-title">🛡️ 合规审核</div>
      ${compliance.risk_points.map((r, i) => `
        <div class="compliance-item">
          <strong>风险${i + 1}：</strong>${r}<br>
          <strong>建议：</strong>${compliance.suggestions[i] || '请核实修改'}
        </div>
      `).join('')}
    </div>
  ` : '';

  body.innerHTML = `
    <div class="article-title">${article.title}</div>
    <div class="article-meta">
      来源：${topic.source} · ${topic.date} · 热度 ${topic.score}/5 · ${article.sections.reduce((acc, s) => acc + (s.paragraphs ? s.paragraphs.join('').length : (s.content||'').length), 0)}字
    </div>
    <div class="article-body">${articleHtml}</div>
    ${complianceHtml}
  `;

  document.getElementById('articleModal').classList.add('visible');
}

function closeModal() {
  document.getElementById('articleModal').classList.remove('visible');
}

// Close modal on overlay click
document.getElementById('articleModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// Close modal on Escape
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

// Auto-detect backend on page load
checkBackend();
</script>
</body>
</html>
